function getGap(emp) {
  const sk = emp.skills||[];
  const gap = sk.reduce((s,x)=>s+Math.max(0,x.required-x.current),0);
  const tot = sk.reduce((s,x)=>s+x.required,0);
  return {gap, tot, pct: tot>0?Math.round(gap/tot*100):0};
}

function compressImage(file, callback) {
  if(!file.type.startsWith("image/")) {
    if(file.size > 1.5 * 1024 * 1024) { alert("Document is too large (Max 1.5MB)."); callback(null); return; }
    const r = new FileReader();
    r.onload = e => callback({name:file.name, url:e.target.result});
    r.readAsDataURL(file);
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement("canvas");
      let w = img.width, h = img.height;
      if(w > 1200) { h *= 1200/w; w = 1200; }
      if(h > 1200) { w *= 1200/h; h = 1200; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      callback({name:file.name, url:canvas.toDataURL("image/jpeg", 0.6)});
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function downloadDataUrl(url, filename) {

  if(pct===0) return <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-semibold bg-green-50 text-green-700 border border-green-200">Competent</span>;
  if(pct<=25) return <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-semibold bg-yellow-50 text-yellow-700 border border-yellow-200">Minor Gap · {pct}%</span>;
  return <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-semibold bg-red-50 text-red-700 border border-red-200">Critical · {pct}%</span>;
}
function StatusDot({pct}) {
  if(pct===0) return <span className="inline-block w-2 h-2 rounded-full bg-green-500"></span>;
  if(pct<=25) return <span className="inline-block w-2 h-2 rounded-full bg-yellow-500"></span>;
  return <span className="inline-block w-2 h-2 rounded-full bg-red-500"></span>;
}
function AvatarCircle({emp,size=36}) {
  const bg = getDC(emp.department);
  return (
    <div style={{width:size,height:size,borderRadius:size*0.28,background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:size*0.34,color:"#fff",flexShrink:0,overflow:"hidden"}}>
      {emp.photo ? <img src={emp.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : initials(emp.name)}
    </div>
  );
}
function SkillBar({current,required}) {
  const pct = Math.min(100, Math.round(current/required*100));
  const gap = required-current;
  const color = gap===0?"#16A34A":gap===1?"#CA8A04":"#DC2626";
  return (
    <div className="flex items-center gap-2">
      <div className="flex-1 h-1.5 bg-gray-200 rounded-full overflow-hidden">
        <div style={{width:pct+"%",height:"100%",background:color,borderRadius:9999,transition:"width 0.3s"}}></div>
      </div>
      <span className="text-xs font-mono font-medium" style={{color,minWidth:28}}>{current}/{required}</span>
    </div>
  );
}

// ─── CHARTS ───────────────────────────────────────────────────────────────
function BarChart({data,height=160}) {
  const max = Math.max(...data.map(d=>d.value),1);
  const bw = 32, gap = 16, totalW = data.length*(bw+gap)-gap;
  return (
    <svg width="100%" viewBox={`0 0 ${totalW} ${height+30}`} preserveAspectRatio="xMidYMid meet">
      {data.map((d,i)=>{
        const barH = Math.round((d.value/max)*height);
        const x = i*(bw+gap);
        const y = height-barH;
        const color = d.value===0?"#E5E7EB":d.value>50?"#DC2626":d.value>25?"#CA8A04":"#16A34A";
        return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={barH} fill={color} rx={4} opacity={0.85}/>
            <text x={x+bw/2} y={height+14} textAnchor="middle" fontSize={9} fill="#9CA3AF" fontFamily="IBM Plex Sans">{d.label}</text>
            {d.value>0&&<text x={x+bw/2} y={y-4} textAnchor="middle" fontSize={9} fontWeight="600" fill="#374151" fontFamily="IBM Plex Sans">{d.value}%</text>}
          </g>
        );
      })}
    </svg>
  );
}
function DonutChart({segments,size=110,label,sublabel}) {
  const total = segments.reduce((s,d)=>s+d.value,0)||1;
  const r=36, cx=size/2, cy=size/2, sw=18, circ=2*Math.PI*r;
  let off=0;
  const arcs = segments.map((seg,i)=>{
    const frac=seg.value/total;
    const dash=frac*circ;
    const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={seg.color} strokeWidth={sw} strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-(off*circ)} transform={`rotate(-90,${cx},${cy})`}/>;
    off+=frac; return el;
  });
  return (
    <svg width={size} height={size}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#F3F4F6" strokeWidth={sw}/>
      {arcs}
      {label&&<text x={cx} y={cy-4} textAnchor="middle" fontSize={15} fontWeight="700" fill="#111827" fontFamily="IBM Plex Sans">{label}</text>}
      {sublabel&&<text x={cx} y={cy+13} textAnchor="middle" fontSize={9} fill="#9CA3AF" fontFamily="IBM Plex Sans">{sublabel}</text>}
    </svg>
  );
}

// ─── DASHBOARD PAGE ───────────────────────────────────────────────────────
function DashboardPage({emps,onSelect}) {
  const total = emps.length;
  const allSkills = emps.flatMap(e=>e.skills||[]);
  const totalGap = allSkills.reduce((s,sk)=>s+Math.max(0,sk.required-sk.current),0);
  const totalReq = allSkills.reduce((s,sk)=>s+sk.required,0);
  const overallGapPct = totalReq>0?Math.round(totalGap/totalReq*100):0;
  const empsWithGap = emps.filter(e=>getGap(e).gap>0).length;
  const allTrainings = emps.flatMap(e=>(e.skills||[]).flatMap(sk=>sk.trainings||[]));
  const completedT = allTrainings.filter(t=>t.pass===true).length;
  const overdueT = allTrainings.filter(t=>t.nextDate&&isOverdue(t.nextDate)&&!t.pass).length;

  // Dept gap chart
  const depts = [...new Set(emps.map(e=>e.department))];
  const deptData = depts.map(dept=>{
    const de = emps.filter(e=>e.department===dept);
    const dg = de.flatMap(e=>e.skills||[]).reduce((s,sk)=>s+Math.max(0,sk.required-sk.current),0);
    const dr = de.flatMap(e=>e.skills||[]).reduce((s,sk)=>s+sk.required,0);
    return {label:dept.slice(0,8),value:dr>0?Math.round(dg/dr*100):0};
  }).sort((a,b)=>b.value-a.value).slice(0,8);

  // Skill gap distribution donut
  const competent = emps.filter(e=>getGap(e).pct===0).length;
  const minor = emps.filter(e=>{const p=getGap(e).pct;return p>0&&p<=25;}).length;
  const critical = emps.filter(e=>getGap(e).pct>25).length;

  // Top gap employees
  const topGap = [...emps].sort((a,b)=>getGap(b).pct-getGap(a).pct).slice(0,5);

  const kpis = [
    {label:"Total Employees",value:total,sub:"Active headcount",color:"#2563EB",bg:"#EFF6FF",icon:IC.users},
    {label:"Overall Skill Gap",value:overallGapPct+"%",sub:`${totalGap} gap points across all skills`,color:"#DC2626",bg:"#FEF2F2",icon:IC.alert},
    {label:"Employees with Gaps",value:empsWithGap,sub:`of ${total} need attention`,color:"#CA8A04",bg:"#FFFBEB",icon:IC.chart},
    {label:"Trainings Completed",value:completedT,sub:`${overdueT} overdue reviews`,color:"#16A34A",bg:"#F0FDF4",icon:IC.book},
  ];

  return (
    <div className="fade-up">
      {/* KPIs */}
      <div className="grid grid-cols-2 xl:grid-cols-4 gap-4 mb-6">
        {kpis.map((k,i)=>(
          <div key={i} className="bg-white rounded-xl p-5 border border-gray-200 shadow-sm">
            <div className="flex items-start justify-between mb-3">
              <div>
                <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">{k.label}</p>
                <p className="text-2xl font-bold text-gray-900 mt-1">{k.value}</p>
              </div>
              <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:k.bg}}>
                <k.icon className="w-5 h-5" style={{color:k.color}}/>
              </div>
            </div>
            <p className="text-xs text-gray-400">{k.sub}</p>
          </div>
        ))}
      </div>

      <div className="grid grid-cols-1 xl:grid-cols-3 gap-4 mb-4">
        {/* Bar chart */}
        <div className="xl:col-span-2 bg-white rounded-xl p-5 border border-gray-200 shadow-sm">
          <h3 className="text-sm font-semibold text-gray-700 mb-1">Skill Gap by Department (%)</h3>
          <p className="text-xs text-gray-400 mb-4">Lower is better. Red = Critical, Yellow = Moderate, Green = Good.</p>
          <BarChart data={deptData}/>
        </div>
        {/* Donut */}
        <div className="bg-white rounded-xl p-5 border border-gray-200 shadow-sm flex flex-col items-center">
          <h3 className="text-sm font-semibold text-gray-700 mb-1 self-start">Employee Skill Status</h3>
          <p className="text-xs text-gray-400 mb-4 self-start">Distribution across all {total} employees</p>
          <DonutChart size={120} segments={[
            {value:competent,color:"#16A34A"},{value:minor,color:"#CA8A04"},{value:critical,color:"#DC2626"}
          ]} label={total} sublabel="employees"/>
          <div className="mt-4 space-y-2 w-full">
            {[{label:"Competent",count:competent,color:"#16A34A"},{label:"Minor Gap",count:minor,color:"#CA8A04"},{label:"Critical Gap",count:critical,color:"#DC2626"}].map(s=>(
              <div key={s.label} className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-sm flex-shrink-0" style={{background:s.color}}></div>
                <span className="text-xs text-gray-600 flex-1">{s.label}</span>
                <span className="text-xs font-semibold text-gray-800">{s.count}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Top gap table */}
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm">
        <div className="px-5 py-4 border-b border-gray-100">
          <h3 className="text-sm font-semibold text-gray-700">Employees Requiring Attention</h3>
        </div>
        <table className="w-full text-sm">
          <thead><tr className="border-b border-gray-100">
            <th className="px-5 py-2.5 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Employee</th>
            <th className="px-4 py-2.5 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Department</th>
            <th className="px-4 py-2.5 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Designation</th>
            <th className="px-4 py-2.5 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Skill Gap</th>
            <th className="px-4 py-2.5 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Status</th>
          </tr></thead>
          <tbody>
            {topGap.map(emp=>{
              const {pct}=getGap(emp);
              return (
                <tr key={emp.id} className="table-row border-b border-gray-50 cursor-pointer" onClick={()=>onSelect(emp.id)}>
                  <td className="px-5 py-3"><div className="flex items-center gap-3"><AvatarCircle emp={emp}/><div><div className="font-medium text-gray-900">{emp.name}</div><div className="text-xs text-gray-400">{emp.cardNo}</div></div></div></td>
                  <td className="px-4 py-3 text-gray-600">{emp.department}</td>
                  <td className="px-4 py-3 text-gray-600">{emp.designation}</td>
                  <td className="px-4 py-3"><div className="flex items-center gap-2"><div className="w-24 h-1.5 bg-gray-200 rounded-full overflow-hidden"><div style={{width:pct+"%",height:"100%",background:pct>50?"#DC2626":pct>25?"#CA8A04":"#16A34A",borderRadius:9999}}></div></div><span className="text-xs font-mono text-gray-600">{pct}%</span></div></td>
                  <td className="px-4 py-3"><GapBadge pct={pct}/></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

                    <td className="px-4 py-3"><GapBadge pct={pct}/></td>
                    <td className="px-4 py-3">
                      <button className="text-xs text-blue-600 font-medium hover:text-blue-800 px-2 py-1 rounded hover:bg-blue-50">View →</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {/* Pagination */}
        {pages>1&&<div className="px-5 py-3 border-t border-gray-100 flex items-center justify-between">
          <span className="text-xs text-gray-400">Page {page} of {pages}</span>
          <div className="flex gap-1">
            {Array.from({length:pages},(_,i)=>(
              <button key={i} onClick={()=>setPage(i+1)} className={`w-7 h-7 text-xs rounded font-medium ${page===i+1?"bg-blue-600 text-white":"text-gray-500 hover:bg-gray-100"}`}>{i+1}</button>
            ))}
          </div>
        </div>}
      </div>
    </div>
  );
}

// ─── SKILL MATRIX ─────────────────────────────────────────────────────────
function SkillMatrixPage({emps}) {
  const [dept,setDept] = useState("All");
  const depts = ["All",...new Set(emps.map(e=>e.department))].sort();
  const filtered = dept==="All"?emps:emps.filter(e=>e.department===dept);
  const allSkillNames = useMemo(()=>{
    const set = new Set();
    filtered.forEach(e=>(e.skills||[]).forEach(s=>set.add(s.name)));
    return Array.from(set).sort();
  },[filtered]);

  function cellInfo(emp,skillName) {
    const sk=(emp.skills||[]).find(s=>s.name===skillName);
    if(!sk) return null;
    return {c:sk.current,r:sk.required,gap:sk.required-sk.current};
  }

  return (
    <div className="fade-up">
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4 mb-4 flex items-center gap-4">
        <select value={dept} onChange={e=>setDept(e.target.value)} className="text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white text-gray-700">
          {depts.map(d=><option key={d}>{d}</option>)}
        </select>
        <div className="flex items-center gap-5 ml-4 text-xs text-gray-500">
          {[{c:"#DCFCE7",tc:"#166534",l:"Competent (0 gap)"},{c:"#FEF9C3",tc:"#854D0E",l:"Minor Gap (1)"},{c:"#FEE2E2",tc:"#991B1B",l:"Critical Gap (2+)"},{c:"#F3F4F6",tc:"#6B7280",l:"Not Applicable"}].map(x=>(
            <div key={x.l} className="flex items-center gap-1.5"><div className="w-5 h-4 rounded border" style={{background:x.c}}></div><span>{x.l}</span></div>
          ))}
        </div>
        <div className="ml-auto text-xs text-gray-400">{filtered.length} employees · {allSkillNames.length} skills</div>
      </div>
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div className="overflow-auto" style={{maxHeight:"calc(100vh - 240px)"}}>
          <table className="text-xs border-collapse">
            <thead>
              <tr>
                <th className="sticky left-0 bg-gray-50 z-10 border-b border-r border-gray-200 px-4 py-3 text-left font-semibold text-gray-500 text-xs uppercase tracking-wide" style={{minWidth:180}}>Employee</th>
                {allSkillNames.map(sk=>(
                  <th key={sk} className="skill-cell border-b border-r border-gray-100 px-1 py-2 text-center font-medium text-gray-500" style={{writingMode:"vertical-rl",transform:"rotate(180deg)",height:90}}>
                    <span style={{display:"inline-block",maxHeight:80,overflow:"hidden",textOverflow:"ellipsis"}}>{sk}</span>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(emp=>(
                <tr key={emp.id} className="border-b border-gray-100">
                  <td className="sticky left-0 bg-white z-10 border-r border-gray-200 px-4 py-2">
                    <div className="flex items-center gap-2">
                      <AvatarCircle emp={emp} size={28}/>
                      <div>
                        <div className="font-medium text-gray-800">{emp.name}</div>
                        <div className="text-gray-400" style={{fontSize:10}}>{emp.designation}</div>
                      </div>
                    </div>
                  </td>
                  {allSkillNames.map(sk=>{
                    const info=cellInfo(emp,sk);
                    if(!info) return <td key={sk} className="skill-cell border-r border-gray-100 text-center"><div className="mx-1 my-1 rounded" style={{background:"#F3F4F6",height:28}}></div></td>;
                    const {c,r,gap}=info;
                    const bg=gap<=0?"#DCFCE7":gap===1?"#FEF9C3":"#FEE2E2";
                    const tc=gap<=0?"#166534":gap===1?"#854D0E":"#991B1B";
                    return (
                      <td key={sk} className="skill-cell border-r border-gray-100 text-center">
                        <div className="mx-1 my-1 rounded flex items-center justify-center font-mono font-semibold text-xs" style={{background:bg,color:tc,height:28}}>{c}/{r}</div>
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── TRAINING PAGE ────────────────────────────────────────────────────────
function TrainingPage({emps,onSelect,onBatchUpdate}) {
  const [dept,setDept] = useState("All");
  const [searchTerm, setSearchTerm] = useState("");
  const [view, setView] = useState("records"); // records, autoPlan, adHoc
  const [scheduleData, setScheduleData] = useState({});
  const [adHocDept, setAdHocDept] = useState("All");
  const [adHocForm, setAdHocForm] = useState({topic:"", trainer:"", date:"", time:"", venue:""});
  const [selectedEmps, setSelectedEmps] = useState({});

  const depts = ["All",...new Set(emps.map(e=>e.department))].sort();
  const filtered = dept==="All"?emps:emps.filter(e=>e.department===dept);
  const adHocEmps = adHocDept==="All"?emps:emps.filter(e=>e.department===adHocDept);

  const autoPlan = useMemo(() => {
    let planMap = {};
    filtered.forEach(emp => {
      (emp.skills || []).forEach(sk => {
        const hasGap = sk.current < sk.required;
        const noTraining = (!sk.trainings || sk.trainings.filter(t=>t.status==='planned'||t.pass===null).length === 0);
        const hasOverdue = (sk.trainings || []).some(t => t.nextDate && isOverdue(t.nextDate) && t.pass !== true);
        let reason = "";
        if (hasOverdue) reason = "Overdue Re-evaluation";
        else if (hasGap && noTraining) reason = `Skill Gap (${sk.current}/${sk.required})`;
        if (reason) {
          if(!planMap[sk.name]) planMap[sk.name] = [];
          planMap[sk.name].push({ emp, reason });
        }
      });
    });
    return Object.keys(planMap).sort().map(skillName => ({
      skill: skillName,
      attendees: planMap[skillName].sort((a,b)=>a.emp.department.localeCompare(b.emp.department) || a.emp.name.localeCompare(b.emp.name))
    }));
  }, [filtered]);

  const rows = filtered.flatMap(emp=>
    (emp.skills||[]).flatMap(sk=>(sk.trainings||[]).map(t=>({emp,skill:sk,training:t})))
  ).filter(r=>r.training.topic).filter(r=>{
    if(!searchTerm) return true;
    const term = searchTerm.toLowerCase();
    return r.emp.name.toLowerCase().includes(term) || (r.emp.cardNo||"").toLowerCase().includes(term) || r.training.topic.toLowerCase().includes(term);
  }).sort((a,b)=>new Date(b.training.date)-new Date(a.training.date));

  const STEPS = ["Planned","Training Done","Evaluation","Completed"];
  function getStep(t) {
    if(t.pass===true) return 3;
    if(t.pass===false) return 2;
    if(t.date) return 1;
    return 0;
  }

  function toggleEmpSelect(id) {
    setSelectedEmps(prev=>({...prev, [id]:!prev[id]}));
  }
  function selectAllAdHoc() {
    const allSelected = adHocEmps.every(e=>selectedEmps[e.id]);
    const next = {...selectedEmps};
    adHocEmps.forEach(e => next[e.id] = !allSelected);
    setSelectedEmps(next);
  }

  function handleAutoSchedule() {
    let upserts = [];
    autoPlan.forEach(cls => {
      const {date, time, venue} = scheduleData[cls.skill] || {};
      if(date && time && venue) {
        cls.attendees.forEach(att => {
          let updatedEmp = upserts.find(u => u.id === att.emp.id) || {...att.emp, skills: [...(att.emp.skills||[])]};
          updatedEmp.skills = updatedEmp.skills.map(sk => {
            if(sk.name === cls.skill) {
               return {...sk, trainings: [...(sk.trainings||[]), {
                 id: "t_"+Date.now()+Math.random().toString(36).slice(2,5),
                 topic: cls.skill + " Mandatory Gap Training",
                 trainer: "Internal",
                 type: "Classroom",
                 date: date + " " + time,
                 venue: venue,
                 status: "planned",
                 pass: null
               }]};
            }
            return sk;
          });
          const uIdx = upserts.findIndex(u => u.id === updatedEmp.id);
          if(uIdx>=0) upserts[uIdx] = updatedEmp; else upserts.push(updatedEmp);
        });
      }
    });
    if(upserts.length === 0) { alert("Please fill out Date, Time, and Venue for at least one class!"); return; }
    if(!onBatchUpdate){ alert("Batch update missing"); return; }
    onBatchUpdate(upserts);
    alert(`✅ Successfully scheduled training for ${upserts.length} employees. Notifications simulated to Department Owners.`);
    setView("records");
    setScheduleData({});
  }

  function handleAdHocSchedule() {
    const targets = adHocEmps.filter(e=>selectedEmps[e.id]);
    if(!targets.length) { alert("Select at least one employee."); return; }
    if(!adHocForm.topic || !adHocForm.date || !adHocForm.time || !adHocForm.venue) {
      alert("Please fill out all ad-hoc training details."); return;
    }
    let upserts = [];
    targets.forEach(emp => {
      let updatedEmp = {...emp, skills: [...(emp.skills||[])]};
      let genSkill = updatedEmp.skills.find(s=>s.name==="General / Ad-Hoc");
      if(!genSkill) {
         genSkill = { id: "sk_gen", name: "General / Ad-Hoc", required: 1, current: 1, trainings: [] };
         updatedEmp.skills.push(genSkill);
      }
      updatedEmp.skills = updatedEmp.skills.map(sk => {
        if(sk.name === "General / Ad-Hoc") {
           return {...sk, trainings: [...(sk.trainings||[]), {
             id: "t_adhoc_"+Date.now()+Math.random().toString(36).slice(2,5),
             topic: adHocForm.topic,
             trainer: adHocForm.trainer || "General Trainer",
             type: "Classroom",
             date: adHocForm.date + " " + adHocForm.time,
             venue: adHocForm.venue,
             status: "planned",
             pass: null
           }]};
        }
        return sk;
      });
      upserts.push(updatedEmp);
    });
    if(!onBatchUpdate){ alert("Batch update missing"); return; }
    onBatchUpdate(upserts);
    alert(`✅ Ad-Hoc Training Scheduled for ${upserts.length} employees.`);
    setView("records");
    setAdHocForm({topic:"", trainer:"", date:"", time:"", venue:""});
    setSelectedEmps({});
  }

  return (
    <div className="fade-up">
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-3 mb-4 flex items-center gap-2 print:hidden">
        <div className="flex items-center bg-gray-100 p-1 rounded-lg mr-4">
          <button onClick={()=>setView("records")} className={`px-4 py-1.5 text-sm font-medium rounded-md transition-colors ${view==='records'?'bg-white shadow-sm text-blue-700':'text-gray-500 hover:text-gray-700'}`}>Training Records</button>
          <button onClick={()=>setView("autoPlan")} className={`px-4 py-1.5 text-sm font-medium rounded-md transition-colors ${view==='autoPlan'?'bg-white shadow-sm text-blue-700':'text-gray-500 hover:text-gray-700'}`}>
            <IC.matrix className="w-4 h-4 inline-block -mt-0.5 mr-1"/> 1-Click Auto-Planner
          </button>
          <button onClick={()=>setView("adHoc")} className={`px-4 py-1.5 text-sm font-medium rounded-md transition-colors ${view==='adHoc'?'bg-white shadow-sm text-blue-700':'text-gray-500 hover:text-gray-700'}`}>
            <IC.calendar className="w-4 h-4 inline-block -mt-0.5 mr-1"/> Ad-Hoc Group Training
          </button>
        </div>

        {view === "records" && (
          <>
            <span className="text-sm font-medium text-gray-600">Filter:</span>
            <select value={dept} onChange={e=>setDept(e.target.value)} className="text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white text-gray-700 cursor-pointer">
              {depts.map(d=><option key={d}>{d}</option>)}
            </select>
            <input value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} placeholder="Search employee or topic..." className="text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white text-gray-700 ml-2 min-w-[200px] outline-none focus:ring-2 focus:ring-blue-500"/>
            <span className="text-xs text-gray-400 ml-2">{rows.length} records</span>
          </>
        )}

        {view === "autoPlan" && (
          <>
            <button onClick={handleAutoSchedule} className="ml-auto flex items-center gap-2 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white px-5 py-2 rounded-lg text-sm font-semibold transition-all shadow-md">
              <IC.check className="w-4 h-4"/> Confirm & Schedule All
            </button>
          </>
        )}
      </div>

      {view === "autoPlan" && (
        <div className="space-y-6 print:space-y-4 max-w-5xl mx-auto auto-page-break">
          {autoPlan.length === 0 ? (
            <div className="text-center p-12 bg-white rounded-xl border border-gray-200">
               <div className="w-16 h-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4"><IC.check className="w-8 h-8"/></div>
               <h3 className="text-lg font-bold text-gray-800">100% Compliant</h3>
               <p className="text-gray-500 mt-1">No skill gaps or overdue trainings detected for the factory.</p>
            </div>
          ) : (
            autoPlan.map((cls, i) => (
              <div key={i} className="bg-white rounded-xl border border-indigo-200 shadow-sm overflow-hidden mb-6">
                <div className="bg-gradient-to-r from-indigo-50 to-blue-50 px-5 py-3 border-b border-indigo-100 flex items-center justify-between">
                  <h3 className="font-bold text-indigo-900 text-lg flex items-center gap-2">Class {i+1}: {cls.skill}</h3>
                  <div className="bg-white text-indigo-700 text-xs font-bold px-3 py-1 rounded-full border border-indigo-200 shadow-sm">{cls.attendees.length} Trainee{cls.attendees.length>1?'s':''}</div>
                </div>
                <div className="p-0">
                  <table className="w-full text-sm table-fixed">
                    <thead>
                      <tr className="bg-gray-50 border-b border-gray-200">
                        <th className="px-5 py-2.5 text-left text-xs font-semibold text-gray-500 uppercase w-1/3">Employee Name</th>
                        <th className="px-5 py-2.5 text-left text-xs font-semibold text-gray-500 uppercase w-1/3">Department</th>
                        <th className="px-5 py-2.5 text-left text-xs font-semibold text-gray-500 uppercase w-1/3">Reason for Training</th>
                      </tr>
                    </thead>
                    <tbody>
                      {cls.attendees.map((att, j) => (
                        <tr key={j} className="border-b border-gray-100 last:border-0 hover:bg-gray-50">
                          <td className="px-5 py-2.5 font-medium text-gray-900 truncate">{att.emp.name} <span className="text-xs text-gray-400 font-normal ml-1">({att.emp.cardNo})</span></td>
                          <td className="px-5 py-2.5"><span className="px-2 py-1 rounded-md text-xs font-medium border border-gray-200 bg-white text-gray-600 truncate inline-block max-w-full">{att.emp.department}</span></td>
                          <td className="px-5 py-2.5 text-red-600 font-medium text-xs">{att.reason}</td>

                      ))}

                  </table>
                  <div className="bg-blue-50/50 px-6 py-4 border-t border-indigo-100 flex flex-wrap items-center gap-4 text-sm text-gray-700">
                     <div className="flex items-center gap-2 font-semibold text-indigo-900">Schedule this Class:</div>
                     <input type="date" className="border border-gray-300 rounded-md px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" 
                            value={scheduleData[cls.skill]?.date||""} 
                            onChange={e=>setScheduleData(p=>({...p, [cls.skill]:{...p[cls.skill], date:e.target.value}}))}/>
                     <input type="time" className="border border-gray-300 rounded-md px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" 
                            value={scheduleData[cls.skill]?.time||""} 
                            onChange={e=>setScheduleData(p=>({...p, [cls.skill]:{...p[cls.skill], time:e.target.value}}))}/>
                     <input type="text" placeholder="Enter Training Venue..." className="border border-gray-300 rounded-md px-3 py-1.5 text-sm w-64 focus:ring-2 focus:ring-indigo-500 outline-none" 
                            value={scheduleData[cls.skill]?.venue||""} 
                            onChange={e=>setScheduleData(p=>({...p, [cls.skill]:{...p[cls.skill], venue:e.target.value}}))}/>
                  </div>
                </div>
              </div>
            ))
          )}
        </div>
      )}

      {view === "adHoc" && (
        <div className="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
           <div className="md:col-span-1 space-y-4">
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                 <h3 className="text-sm font-bold text-gray-800 border-b border-gray-100 pb-3 mb-4">Training Details</h3>
                 <div className="space-y-3">
                    <div>
                      <label className="text-xs font-semibold text-gray-500 block mb-1">Training Topic</label>
                      <input value={adHocForm.topic} onChange={e=>setAdHocForm(p=>({...p,topic:e.target.value}))} placeholder="e.g. POSH Training, Fire Safety" className="w-full text-sm border border-gray-300 rounded-md px-3 py-2 bg-white"/>
                    </div>
                    <div>
                      <label className="text-xs font-semibold text-gray-500 block mb-1">Trainer Name</label>
                      <input value={adHocForm.trainer} onChange={e=>setAdHocForm(p=>({...p,trainer:e.target.value}))} placeholder="e.g. External Agency" className="w-full text-sm border border-gray-300 rounded-md px-3 py-2 bg-white"/>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="text-xs font-semibold text-gray-500 block mb-1">Date</label>
                        <input type="date" value={adHocForm.date} onChange={e=>setAdHocForm(p=>({...p,date:e.target.value}))} className="w-full text-sm border border-gray-300 rounded-md px-3 py-2 bg-white"/>
                      </div>
                      <div>
                        <label className="text-xs font-semibold text-gray-500 block mb-1">Time</label>
                        <input type="time" value={adHocForm.time} onChange={e=>setAdHocForm(p=>({...p,time:e.target.value}))} className="w-full text-sm border border-gray-300 rounded-md px-3 py-2 bg-white"/>
                      </div>
                    </div>
                    <div>
                      <label className="text-xs font-semibold text-gray-500 block mb-1">Venue</label>
                      <input value={adHocForm.venue} onChange={e=>setAdHocForm(p=>({...p,venue:e.target.value}))} placeholder="e.g. Conference Room A" className="w-full text-sm border border-gray-300 rounded-md px-3 py-2 bg-white"/>
                    </div>
                 </div>
                 <button onClick={handleAdHocSchedule} className="w-full mt-6 flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-semibold transition-all shadow-md">
                    <IC.calendar className="w-4 h-4"/> Schedule Group Training
                 </button>
              </div>
           </div>
           <div className="md:col-span-2">
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col h-[500px]">
                 <div className="p-4 border-b border-gray-100 flex items-center justify-between">
                    <div>
                       <h3 className="text-sm font-bold text-gray-800">Select Trainees</h3>

            <div className="space-y-3">

                  <div key={i} className={`bg-white rounded-xl border shadow-sm p-4 ${od?'border-red-200':'border-gray-200'}`}>

                          <div className="font-semibold text-gray-900 text-sm cursor-pointer hover:text-blue-600" onClick={()=>onSelect(emp.id)}>{emp.name}</div>
                          <div className="text-xs text-gray-400">{emp.designation}</div>
                        </div>
                      </div>
                      <div className="min-w-[140px]">
                        <div className="text-xs text-gray-400 mb-0.5">Skill Level</div>
                        <div className="text-sm font-medium text-gray-700">{skill.name}</div>
                        <div className="text-xs text-gray-400">{skill.current}/{skill.required} proficiency</div>

                      <div className="flex-1 min-w-[200px]">
                        <div className="text-xs text-gray-400 mb-0.5">Training Details</div>
                        <div className="text-sm font-medium text-gray-700">{training.topic}</div>
                        <div className="text-xs text-gray-400">{fmtDate(training.date)} {training.venue ? `· Room: ${training.venue}` : ''}</div>
                      </div>
                      <div className="flex items-center gap-0">
                        {STEPS.map((s,si)=>{
                          const done=step>si, current=step===si;
                          return (
                            <div key={s} className="flex items-center">
                              <div className="flex flex-col items-center gap-1">
                                <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold border-2 ${done?'bg-green-500 border-green-500 text-white':current?'bg-blue-600 border-blue-600 text-white':'bg-white border-gray-300 text-gray-400'}`}>
                                  {done?<IC.check className="w-3 h-3"/>:si+1}
                                </div>
                                <div className={`text-xs whitespace-nowrap ${done?'text-green-600':current?'text-blue-600 font-medium':'text-gray-400'}`} style={{fontSize:9}}>{s}</div>
                              </div>
                              {si<STEPS.length-1&&<div className={`h-0.5 w-6 mb-4 ${done?'bg-green-400':'bg-gray-200'}`}></div>}
                            </div>
                          );
                        })}
                      </div>
                      {od&&<span className="text-xs font-semibold bg-red-50 text-red-700 border border-red-200 px-2 py-1 rounded self-start">Overdue · {fmtDate(training.nextDate)}</span>}
                    </div>
                    {step >= 1 && (
                      <div className="mt-4 pt-4 border-t border-gray-100 grid grid-cols-1 md:grid-cols-2 gap-4">
                         <div className="bg-gray-50 rounded-lg p-3 border border-gray-100">
                           <h4 className="text-xs font-bold text-gray-700 uppercase mb-2 flex items-center gap-1"><IC.fileCheck className="w-3 h-3 text-blue-500"/> Training Evidence</h4>
                           {training.evidence || training.evidenceFile ? (
                              <div className="text-sm text-gray-600">
                                {training.evidence && <p className="mb-2 italic">"{training.evidence}"</p>}
                                {training.evidenceFile && <a href={training.evidenceFile} target="_blank" rel="noreferrer" className="text-blue-600 font-medium hover:underline flex items-center gap-1.5"><IC.link className="w-3 h-3"/> View Attached Document</a>}
                              </div>
                           ) : (
                              <p className="text-xs text-amber-600 bg-amber-50 px-2 py-1 rounded border border-amber-100 inline-block font-medium">Pending Evidence Upload</p>
                           )}
                         </div>
                         <div className="bg-gray-50 rounded-lg p-3 border border-gray-100">
                           <h4 className="text-xs font-bold text-gray-700 uppercase mb-2 flex items-center gap-1"><IC.clipCheck className="w-3 h-3 text-green-500"/> Evaluation Details</h4>
                           {training.pass !== null ? (
                              <div className="space-y-1.5">
                                 <div className="flex items-center justify-between">
                                    <span className="text-xs text-gray-500">Result:</span>
                                    <span className={`text-xs font-bold px-2 py-0.5 rounded ${training.pass?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>{training.pass?'PASSED':'FAILED'}</span>
                                 </div>
                                 <div className="flex items-center justify-between">
                                    <span className="text-xs text-gray-500">Method:</span>
                                    <span className="text-xs font-medium text-gray-800">{training.method || "N/A"}</span>
                                 </div>
                                 <div className="flex items-center justify-between">
                                    <span className="text-xs text-gray-500">Score:</span>
                                    <span className="text-xs font-medium text-gray-800">{training.score || "N/A"}</span>
                                 </div>
                                 {training.evalNotes && <div className="text-xs text-gray-600 italic border-t border-gray-200 pt-1.5 mt-1.5">"{training.evalNotes}"</div>}
                              </div>
                           ) : (
                              <p className="text-xs text-amber-600 bg-amber-50 px-2 py-1 rounded border border-amber-100 inline-block font-medium">Pending Evaluation</p>
                           )}
                         </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ─── REPORTS PAGE ─────────────────────────────────────────────────────────
function ReportsPage({emps}) {
  const deptSummary = [...new Set(emps.map(e=>e.department))].sort().map(dept=>{
    const de=emps.filter(e=>e.department===dept);
    const totalGap=de.flatMap(e=>e.skills||[]).reduce((s,sk)=>s+Math.max(0,sk.required-sk.current),0);
    const totalReq=de.flatMap(e=>e.skills||[]).reduce((s,sk)=>s+sk.required,0);
    const gapPct=totalReq>0?Math.round(totalGap/totalReq*100):0;
    return {dept,count:de.length,gapPct,totalGap,totalReq};
  });
  return (
    <div className="fade-up">
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div className="px-5 py-4 border-b border-gray-100">
          <h3 className="text-sm font-semibold text-gray-700">Department-wise Skill Gap Report</h3>
          <p className="text-xs text-gray-400 mt-0.5">Summary of skill gaps across all active departments</p>
        </div>
        <table className="w-full text-sm">
          <thead><tr className="bg-gray-50 border-b border-gray-200">
            <th className="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Department</th>
            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Headcount</th>
            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Gap Points</th>
            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Gap %</th>
            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Visual</th>
            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Status</th>
          </tr></thead>
          <tbody>
            {deptSummary.map(r=>(
              <tr key={r.dept} className="border-b border-gray-50 table-row">

                <td className="px-4 py-3 text-gray-600">{r.count}</td>
                <td className="px-4 py-3 font-mono text-gray-600">{r.totalGap}/{r.totalReq}</td>
                <td className="px-4 py-3 font-mono font-semibold text-gray-800">{r.gapPct}%</td>
                <td className="px-4 py-3"><div className="w-32 h-1.5 bg-gray-200 rounded-full overflow-hidden"><div style={{width:r.gapPct+"%",height:"100%",background:r.gapPct>50?"#DC2626":r.gapPct>25?"#CA8A04":"#16A34A",borderRadius:9999}}></div></div></td>
                <td className="px-4 py-3"><GapBadge pct={r.gapPct}/></td>
              </tr>
            ))}

        </table>
      </div>
    </div>
  );
}

// ─── EMPLOYEE DRAWER ──────────────────────────────────────────────────────
function EmployeeDrawer({emp,allEmps,onClose,onUpdate}) {
  const [tab,setTab] = useState("profile");
  const [editMode,setEditMode] = useState(false);
  const [editData,setEditData] = useState(null);
  const [addingSkill,setAddingSkill] = useState(false);
  const [newSkill,setNewSkill] = useState({name:"",required:3,current:1});

  // Training plan modal state
  const [planModal,setPlanModal] = useState(null);   // {skillId} or null
  const [planForm,setPlanForm] = useState({topic:"",trainer:"",type:"Classroom",date:""});

  // Evidence modal
  const [evidModal,setEvidModal] = useState(null);   // {skillId, tIdx}
  const [evidText,setEvidText] = useState("");
  const [evidFile,setEvidFile] = useState(null);

  // Evaluation modal
  const [evalModal,setEvalModal] = useState(null);   // {skillId, tIdx}
  const [evalForm,setEvalForm] = useState({evaluatorName:"",evalDate:new Date().toISOString().split("T")[0],method:"Practical Test",score:"",pass:null,notes:"",evalFile:null});

  // Accordion state
  const [expandedSkills, setExpandedSkills] = useState({});
  function toggleSkill(id) { setExpandedSkills(p=>({...p, [id]:!p[id]})); }

  // Auto-trigger: show training plan prompt if skills have gap + no plan
  const [autoPrompt,setAutoPrompt] = useState(true);

  const manager = allEmps.find(e=>e.id===emp.reportsTo);
  const reports = allEmps.filter(e=>e.reportsTo===emp.id);
  const {gap,tot,pct} = getGap(emp);
  const allTrainings = (emp.skills||[]).flatMap(sk=>(sk.trainings||[]).map(t=>({...t,skillName:sk.name})));

  const gapSkillsNoTrain = (emp.skills||[]).filter(sk=>sk.current<sk.required && (!sk.trainings||sk.trainings.length===0));

  const tabs = [{id:"profile",label:"Profile"},{id:"skills",label:`Skills (${(emp.skills||[]).length})`},{id:"training",label:`Training (${allTrainings.length})`},{id:"jd",label:"Job Description"},{id:"team",label:`Team (${reports.length})`}];

  // --- Edit profile handlers ---
  function startEdit() {
    setEditData({name:emp.name,cardNo:emp.cardNo,dob:emp.dob||"",doj:emp.doj||"",designation:emp.designation,department:emp.department,reportsTo:emp.reportsTo||"",responsibility:emp.responsibility||"",accountability:emp.accountability||"",authority:emp.authority||""});
    setEditMode(true);
  }
  function saveEdit() {
    onUpdate({...emp,...editData,reportsTo:editData.reportsTo||null});
    setEditMode(false);
  }

  // --- Skill handlers ---
  function doAddSkill() {
    if(!newSkill.name.trim()) return;
    const updated = {...emp, skills:[...(emp.skills||[]),{id:"sk"+Date.now(),name:newSkill.name.trim(),required:+newSkill.required,current:+newSkill.current,trainings:[]}]};
    onUpdate(updated); setAddingSkill(false); setNewSkill({name:"",required:3,current:1});
  }
  function doDeleteSkill(skillId) {
    if(!window.confirm("Remove this skill?")) return;
    onUpdate({...emp, skills:(emp.skills||[]).filter(s=>s.id!==skillId)});
  }
  function doUpdateLevel(skillId,field,val) {
    onUpdate({...emp, skills:(emp.skills||[]).map(s=>s.id===skillId?{...s,[field]:Math.min(5,Math.max(0,+val))}:s)});
  }

  // --- Training plan ---
  function openPlanModal(skillId) {
    setPlanForm({topic:"",trainer:"",type:"Classroom",date:"",nextDate:""});
    setPlanModal({skillId});
  }
  function savePlan() {
    if(!planForm.topic.trim()||!planForm.date) { alert("Please fill Topic and Training Date."); return; }
    const t={id:"t"+Date.now(),topic:planForm.topic,trainer:planForm.trainer,date:planForm.date,type:planForm.type,nextDate:planForm.nextDate,status:"planned",evidence:"",pass:null,evalNotes:""};
    onUpdate({...emp, skills:(emp.skills||[]).map(s=>s.id===planModal.skillId?{...s,trainings:[...(s.trainings||[]),t]}:s)});
    setPlanModal(null);
  }

  // --- Evidence ---
  function openEvidModal(skillId,tIdx) { setEvidText(""); setEvidFile(null); setEvidModal({skillId,tIdx}); }
  function saveEvidence() {
    if(!evidText.trim() && !evidFile) { alert("Please provide details or attach a file as evidence."); return; }
    onUpdate({...emp, skills:(emp.skills||[]).map(s=>{
      if(s.id!==evidModal.skillId) return s;
      const ts=[...(s.trainings||[])];
      ts[evidModal.tIdx]={...ts[evidModal.tIdx],evidence:evidText,evidenceFile:evidFile,status:"evidence_done"};
      return {...s,trainings:ts};
    })});
    setEvidModal(null);
  }

  function handleEvidFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    compressImage(file, res => { if(res) setEvidFile(res); });
  }

  // --- Evaluation ---
  function openEvalModal(skillId,tIdx) { 
    setEvalForm({evaluatorName:"", evalDate:new Date().toISOString().split("T")[0], method:"Practical Test", score:"", pass:null, notes:"", evalFile:null}); 
    setEvalModal({skillId,tIdx}); 
  }
  
  function handleEvalFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    compressImage(file, res => { if(res) setEvalForm(f => ({...f, evalFile:res})); });
  }
  function saveEvaluation() {
    if(evalForm.pass===null || !evalForm.evaluatorName?.trim() || !evalForm.score?.trim() || !evalForm.evalFile) { 
      alert("Please complete all required fields and upload the Evaluation Evidence file."); 
      return; 
    }
    onUpdate({...emp, skills:(emp.skills||[]).map(s=>{
      if(s.id!==evalModal.skillId) return s;
      const ts=[...(s.trainings||[])];
      const updated={...ts[evalModal.tIdx], pass:evalForm.pass, evalNotes:evalForm.notes, evaluatorName:evalForm.evaluatorName, evalDate:evalForm.evalDate, evalMethod:evalForm.method, evalScore:evalForm.score, evalFile:evalForm.evalFile, status:"evaluated"};
      ts[evalModal.tIdx]=updated;
      let cur=s.current;
      if(evalForm.pass===true) cur=Math.min(s.required,s.current+1);
      return {...s,current:cur,trainings:ts};
    })});
    setEvalModal(null);
  }
  function doRedoPlan(skillId,tIdx) {
    // Reset the failed training to planned for redo
    onUpdate({...emp, skills:(emp.skills||[]).map(s=>{
      if(s.id!==skillId) return s;
      const ts=[...(s.trainings||[])];
      ts[tIdx]={...ts[tIdx],status:"planned",evidence:"",pass:null,evalNotes:"",date:"",evalDate:""};
      return {...s,trainings:ts};
    })});
  }
  function doDeleteTraining(skillId,tIdx) {
    if(!window.confirm("Remove this training record?")) return;
    onUpdate({...emp, skills:(emp.skills||[]).map(s=>{
      if(s.id!==skillId) return s;
      const ts=[...(s.trainings||[])]; ts.splice(tIdx,1);
      return {...s,trainings:ts};
    })});
  }

  const inp = "w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white";
  const inpSm = "border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-gray-800 bg-white w-full";

  return (
    <div className="h-full flex flex-col bg-white">
      {/* Header */}
      <div className="flex-shrink-0 border-b border-gray-200 p-5">
        <div className="flex items-start gap-3">
          <AvatarCircle emp={emp} size={48}/>
          <div className="flex-1 min-w-0">
            <h2 className="font-bold text-gray-900 text-lg leading-tight">{emp.name}</h2>
            <div className="text-sm text-gray-500">{emp.designation}</div>
            <div className="flex items-center gap-2 mt-1.5">
              <div className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full" style={{background:getDC(emp.department)}}></div><span className="text-xs text-gray-400">{emp.department}</span></div>
              <span className="text-gray-200">·</span>
              <span className="text-xs text-gray-400">{emp.cardNo}</span>
              <GapBadge pct={pct}/>
            </div>
          </div>
          <button onClick={onClose} className="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg"><IC.x className="w-5 h-5"/></button>
        </div>
        <div className="mt-3 flex items-center gap-2">
          <div className="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
            <div style={{width:(100-pct)+"%",height:"100%",background:pct===0?"#16A34A":pct<=25?"#CA8A04":"#DC2626",borderRadius:9999}}></div>
          </div>
          <span className="text-xs font-mono text-gray-500">{100-pct}% competent</span>
        </div>
      </div>
      {/* Tabs */}
      <div className="flex-shrink-0 flex border-b border-gray-200 px-5 gap-4">
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} className={`tab-btn py-3 text-sm ${tab===t.id?"active":""}`}>{t.label}</button>
        ))}
      </div>
      {/* Content */}
      <div className="flex-1 overflow-y-auto p-5">

        {/* ── PROFILE ─────────────────────────────────────────── */}
        {tab==="profile"&&(
          <div className="space-y-4">
            {!editMode?(
              <>
                <div className="grid grid-cols-2 gap-3">
                  {[["Employee ID",emp.id],["Card No",emp.cardNo],["Date of Birth",fmtDate(emp.dob)],["Date of Joining",fmtDate(emp.doj)],["Designation",emp.designation],["Department",emp.department],["Reporting To",manager?manager.name:"—"]].map(([l,v])=>(
                    <div key={l} className="bg-gray-50 rounded-lg p-3">
                      <div className="text-xs text-gray-400 mb-0.5">{l}</div>
                      <div className="text-sm font-semibold text-gray-800">{v}</div>
                    </div>
                  ))}
                </div>
                <button onClick={startEdit} className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-blue-600 border border-blue-200 bg-blue-50 rounded-lg hover:bg-blue-100">
                  <IC.edit className="w-4 h-4"/>Edit Profile
                </button>
              </>
            ):(
              <div className="space-y-3">
                <div className="text-sm font-semibold text-gray-700 mb-1">Edit Employee Profile</div>
                <div className="flex items-center gap-4 mb-2">
                  <div className="w-16 h-16 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center shrink-0 overflow-hidden relative group cursor-pointer" onClick={()=>document.getElementById('editPhotoInput').click()}>
                    {editData.photo ? <img src={editData.photo} className="w-full h-full object-cover"/> : <IC.user className="w-6 h-6 text-gray-400"/>}
                    <div className="absolute inset-0 bg-black/50 hidden group-hover:flex items-center justify-center fade-in">
                      <IC.upload className="w-5 h-5 text-white"/>
                    </div>
                  </div>
                  <div>
                    <div className="text-sm font-semibold text-gray-800">Profile Picture</div>
                    <div className="text-xs text-gray-400">Click to upload (Auto-compressed)</div>
                  </div>
                  <input type="file" id="editPhotoInput" className="hidden" accept="image/*" onChange={(e)=>{
                    const file=e.target.files[0];
                    if(!file)return;
                    compressImage(file, res => { if(res) setEditData({...editData, photo:res.url}); });
                  }}/>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div><div className="text-xs text-gray-400 mb-1">Full Name</div><input value={editData.name} onChange={e=>setEditData({...editData,name:e.target.value})} className={inpSm}/></div>
                  <div><div className="text-xs text-gray-400 mb-1">Card No</div><input value={editData.cardNo} onChange={e=>setEditData({...editData,cardNo:e.target.value})} className={inpSm}/></div>
                  <div><div className="text-xs text-gray-400 mb-1">Date of Birth</div><input type="date" value={editData.dob} onChange={e=>setEditData({...editData,dob:e.target.value})} className={inpSm}/></div>
                  <div><div className="text-xs text-gray-400 mb-1">Date of Joining</div><input type="date" value={editData.doj} onChange={e=>setEditData({...editData,doj:e.target.value})} className={inpSm}/></div>
                  <div><div className="text-xs text-gray-400 mb-1">Designation</div><input value={editData.designation} onChange={e=>setEditData({...editData,designation:e.target.value})} className={inpSm}/></div>
                  <div><div className="text-xs text-gray-400 mb-1">Department</div>
                    <select value={editData.department} onChange={e=>setEditData({...editData,department:e.target.value})} className={inpSm}>
                      {DEPARTMENTS.map(d=><option key={d}>{d}</option>)}
                    </select>
                  </div>
                  <div className="col-span-2"><div className="text-xs text-gray-400 mb-1">Reporting To (Employee ID)</div>
                    <select value={editData.reportsTo||""} onChange={e=>setEditData({...editData,reportsTo:e.target.value||null})} className={inpSm}>
                      <option value="">— None —</option>
                      {allEmps.filter(e=>e.id!==emp.id).map(e=><option key={e.id} value={e.id}>{e.name} ({e.designation})</option>)}
                    </select>
                  </div>
                </div>
                <div className="flex gap-2 pt-2">
                  <button onClick={saveEdit} className="flex-1 bg-blue-600 text-white text-sm font-semibold rounded-lg py-2 hover:bg-blue-700">Save Changes</button>
                  <button onClick={()=>setEditMode(false)} className="px-4 text-sm text-gray-500 border border-gray-200 rounded-lg hover:bg-gray-50">Cancel</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── SKILLS ──────────────────────────────────────────── */}
        {tab==="skills"&&(
          <div className="space-y-3">
            {/* Auto-prompt banner if gaps without training plan */}
            {autoPrompt&&gapSkillsNoTrain.length>0&&(
              <div className="bg-orange-50 border border-orange-200 rounded-xl p-4 flex items-start gap-3">
                <IC.alert className="w-5 h-5 text-orange-500 flex-shrink-0 mt-0.5"/>
                <div className="flex-1">
                  <div className="font-semibold text-orange-800 text-sm">{gapSkillsNoTrain.length} skill{gapSkillsNoTrain.length>1?"s":""} below required — Training Plan needed!</div>
                  <div className="text-xs text-orange-600 mt-0.5">Skills highlighted in red below have no training plan yet. Click <strong>Create Plan</strong> to start the training workflow.</div>
                </div>
                <button onClick={()=>setAutoPrompt(false)} className="text-orange-300 hover:text-orange-500"><IC.x className="w-4 h-4"/></button>
              </div>
            )}

            {(emp.skills||[]).length===0&&!addingSkill&&<div className="text-center py-6 text-gray-400 text-sm">No skills added yet.</div>}

            {(emp.skills||[]).map(sk=>{
              const g=sk.required-sk.current;
              const col=g<=0?"#16A34A":g===1?"#CA8A04":"#DC2626";
              const hasGap=g>0;
              const hasTraining=(sk.trainings||[]).length>0;
              return (
                <div key={sk.id} className={`border rounded-xl p-4 ${hasGap&&!hasTraining?"border-orange-200 bg-orange-50/30":hasGap?"border-yellow-200":"border-gray-200"}`}>
                  <div className="flex items-start justify-between gap-2 mb-3">
                    <div>
                      <div className="font-semibold text-gray-800 text-sm">{sk.name}</div>
                      <div className="text-xs mt-0.5 flex items-center gap-2" style={{color:col}}>
                        {g<=0?"✓ Competent":g===1?"△ Minor Gap":"⚠ Critical Gap"}
                        {hasGap&&!hasTraining&&<span className="bg-orange-100 text-orange-700 border border-orange-200 px-1.5 py-0.5 rounded text-xs font-semibold">No Plan</span>}
                      </div>
                    </div>
                    <div className="flex gap-2 items-center">
                      {(sk.trainings||[]).length>0 && (
                        <button onClick={()=>toggleSkill(sk.id)} className="p-1 px-2 flex items-center gap-1 text-xs font-semibold text-gray-500 hover:text-gray-800 bg-gray-50 border border-gray-200 rounded transition-colors mr-2">
                          {expandedSkills[sk.id]?<IC.chevronUp className="w-3 h-3"/>:<IC.chevronDown className="w-3 h-3"/>} History ({(sk.trainings||[]).length})
                        </button>
                      )}
                      {hasGap&&<button onClick={()=>openPlanModal(sk.id)} className="text-xs text-orange-600 border border-orange-200 bg-orange-50 px-2 py-1 rounded hover:bg-orange-100 font-semibold">+ Create Plan</button>}
                      <button onClick={()=>doDeleteSkill(sk.id)} className="text-xs text-red-400 hover:text-red-600 p-1"><IC.trash className="w-3.5 h-3.5"/></button>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-3 mb-2">
                    <div>
                      <div className="text-xs text-gray-400 mb-1">Required Level</div>
                      <div className="flex items-center gap-1">
                        {[1,2,3,4,5].map(n=><button key={n} onClick={()=>doUpdateLevel(sk.id,"required",n)} className="w-7 h-7 rounded text-xs font-bold border transition-colors" style={{background:n<=sk.required?"#2563EB":"#F3F4F6",color:n<=sk.required?"#fff":"#9CA3AF",borderColor:n<=sk.required?"#2563EB":"#E5E7EB"}}>{n}</button>)}
                      </div>
                    </div>
                    <div>
                      <div className="text-xs text-gray-400 mb-1">Current Level</div>
                      <div className="flex items-center gap-1">
                        {[1,2,3,4,5].map(n=><button key={n} onClick={()=>doUpdateLevel(sk.id,"current",n)} className="w-7 h-7 rounded text-xs font-bold border transition-colors" style={{background:n<=sk.current?col:"#F3F4F6",color:n<=sk.current?"#fff":"#9CA3AF",borderColor:n<=sk.current?col:"#E5E7EB"}}>{n}</button>)}
                      </div>
                    </div>
                  </div>
                  <SkillBar current={sk.current} required={sk.required}/>

                  {/* Training records for this skill */}
                  {expandedSkills[sk.id] && (sk.trainings||[]).length>0 && (
                    <div className="mt-3 border-t border-gray-100 pt-3 space-y-2">
                      {sk.trainings.map((t,ti)=>{
                        const st=getTStatus(t);
                        const bgC=st==="evaluated"&&t.pass===true?"bg-green-50 border-green-200":st==="evaluated"&&t.pass===false?"bg-red-50 border-red-200":st==="evidence_done"?"bg-blue-50 border-blue-200":"bg-gray-50 border-gray-200";
                        return (
                          <div key={ti} className={`rounded-lg p-3 border text-xs ${bgC}`}>
                            <div className="flex items-center justify-between gap-2 mb-2">
                              <div className="font-semibold text-gray-700">{t.topic}</div>
                              <div className="flex items-center gap-1">
                                {/* Workflow status pill */}
                                {st==="planned"&&<span className="bg-gray-200 text-gray-600 px-2 py-0.5 rounded font-semibold">📋 Planned</span>}
                                {st==="evidence_done"&&<span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-semibold">📁 Evidence Done</span>}
                                {st==="evaluated"&&t.pass===true&&<span className="bg-green-100 text-green-700 px-2 py-0.5 rounded font-semibold">✓ Passed</span>}
                                {st==="evaluated"&&t.pass===false&&<span className="bg-red-100 text-red-700 px-2 py-0.5 rounded font-semibold">✗ Failed</span>}
                                <button onClick={()=>doDeleteTraining(sk.id,ti)} className="text-gray-300 hover:text-red-400 ml-1"><IC.x className="w-3.5 h-3.5"/></button>
                              </div>
                            </div>
                            <div className="text-gray-400">{t.trainer&&`${t.trainer} · `}{t.type} · Target: {fmtDate(t.date)}</div>
                            
                            {(t.evidence||t.evidenceFile)&&(
                              <div className="mt-2 text-gray-500 bg-white/80 rounded p-2 flex flex-col gap-1.5 text-xs shadow-sm">
                                <div className="font-semibold text-gray-700 mb-0.5 border-b border-gray-100 pb-1">Training Execution Evidence</div>
                                {t.evidence&&<div>📝 Details: {t.evidence}</div>}
                                {t.evidenceFile&&(
                                  <button onClick={()=>downloadDataUrl(t.evidenceFile.url, t.evidenceFile.name)} className="self-start flex items-center gap-1 bg-white text-blue-700 border border-blue-200 px-2 py-1 rounded font-semibold hover:bg-blue-50 transition shadow-sm">
                                    <IC.download className="w-3 h-3"/> Download Training File
                                  </button>
                                )}
                              </div>
                            )}

                            {st==="evaluated"&&(
                              <div className="mt-2 text-gray-600 bg-purple-50 border border-purple-100/50 rounded p-2 text-xs shadow-sm">
                                <div className="font-semibold text-purple-800 mb-1 border-b border-purple-200/50 pb-1">Evaluation Details</div>
                                <div className="grid grid-cols-2 gap-1 mb-1.5">
                                  <div><span className="text-gray-400">Evaluator:</span> <span className="font-medium text-gray-800">{t.evaluatorName}</span></div>
                                  <div><span className="text-gray-400">Date:</span> <span className="font-medium text-gray-800">{fmtDate(t.evalDate)}</span></div>
                                  <div><span className="text-gray-400">Method:</span> <span className="font-medium text-gray-800">{t.evalMethod}</span></div>
                                  <div><span className="text-gray-400">Target Score:</span> <span className="font-medium text-gray-800">{t.evalScore}</span></div>
                                </div>
                                {t.evalNotes&&<div className="mb-1.5">📝 Notes: {t.evalNotes}</div>}
                                {t.evalFile&&(
                                  <button onClick={()=>downloadDataUrl(t.evalFile.url, t.evalFile.name)} className="self-start flex items-center gap-1 bg-white text-purple-700 border border-purple-200 px-2 py-0.5 mt-0.5 rounded font-semibold hover:bg-purple-100 transition shadow-sm">
                                    <IC.download className="w-3 h-3"/> Download Eval Sheet
                                  </button>
                                )}
                              </div>
                            )}

                            {/* Action buttons based on workflow state */}
                            <div className="mt-2 flex gap-2">
                              {st==="planned"&&(
                                <button onClick={()=>openEvidModal(sk.id,ti)} className="flex items-center gap-1 bg-blue-600 text-white px-2 py-1 rounded text-xs font-semibold hover:bg-blue-700">
                                  <IC.fileCheck className="w-3 h-3"/>Upload Evidence
                                </button>
                              )}
                              {st==="evidence_done"&&(
                                <button onClick={()=>openEvalModal(sk.id,ti)} className="flex items-center gap-1 bg-purple-600 text-white px-2 py-1 rounded text-xs font-semibold hover:bg-purple-700">
                                  <IC.clipCheck className="w-3 h-3"/>Start Evaluation
                                </button>
                              )}
                              {st==="evaluated"&&t.pass===false&&(
                                <button onClick={()=>doRedoPlan(sk.id,ti)} className="flex items-center gap-1 bg-orange-500 text-white px-2 py-1 rounded text-xs font-semibold hover:bg-orange-600">
                                  <IC.refresh className="w-3 h-3"/>Redo Training Plan
                                </button>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}

            {/* Add Skill */}
            {addingSkill?(
              <div className="border border-blue-200 bg-blue-50 rounded-xl p-4 space-y-3">
                <div className="text-sm font-semibold text-blue-800">Add New Skill</div>
                <input value={newSkill.name} onChange={e=>setNewSkill({...newSkill,name:e.target.value})} placeholder="Skill name *" className={inp} autoFocus/>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <div className="text-xs text-gray-500 mb-1">Required Level (1–5)</div>
                    <div className="flex gap-1">{[1,2,3,4,5].map(n=><button key={n} onClick={()=>setNewSkill({...newSkill,required:n})} className="w-8 h-8 rounded text-xs font-bold border" style={{background:n<=newSkill.required?"#2563EB":"#F3F4F6",color:n<=newSkill.required?"#fff":"#9CA3AF",borderColor:n<=newSkill.required?"#2563EB":"#E5E7EB"}}>{n}</button>)}</div>
                  </div>
                  <div>
                    <div className="text-xs text-gray-500 mb-1">Current Level (1–5)</div>
                    <div className="flex gap-1">{[1,2,3,4,5].map(n=><button key={n} onClick={()=>setNewSkill({...newSkill,current:n})} className="w-8 h-8 rounded text-xs font-bold border" style={{background:n<=newSkill.current?"#16A34A":"#F3F4F6",color:n<=newSkill.current?"#fff":"#9CA3AF",borderColor:n<=newSkill.current?"#16A34A":"#E5E7EB"}}>{n}</button>)}</div>
                  </div>
                </div>
                <div className="flex gap-2">
                  <button onClick={doAddSkill} className="flex-1 bg-blue-600 text-white text-sm font-semibold rounded-lg py-2 hover:bg-blue-700">Add Skill</button>
                  <button onClick={()=>setAddingSkill(false)} className="px-4 text-sm text-gray-500 border border-gray-200 rounded-lg hover:bg-gray-50">Cancel</button>
                </div>
              </div>
            ):(
              <button onClick={()=>setAddingSkill(true)} className="w-full flex items-center justify-center gap-2 border-2 border-dashed border-gray-200 rounded-xl py-3 text-sm text-gray-400 hover:border-blue-300 hover:text-blue-500 transition-colors">
                <IC.plus className="w-4 h-4"/><span>Add Skill</span>
              </button>
            )}
          </div>
        )}

        {/* ── TRAINING ────────────────────────────────────────── */}
        {tab==="training"&&(
          <div className="space-y-3">
            {allTrainings.length===0&&<div className="text-center py-8 text-gray-400 text-sm"><IC.book className="w-8 h-8 mx-auto mb-2 text-gray-300"/>No training records. Go to Skills tab to create a plan.</div>}
            {allTrainings.map((t,i)=>{
              const st=getTStatus(t);
              return (
                <div key={i} className={`rounded-xl border p-4 ${st==="evaluated"&&t.pass===true?"border-green-200 bg-green-50":st==="evaluated"&&t.pass===false?"border-red-200 bg-red-50":st==="evidence_done"?"border-blue-200 bg-blue-50":"border-gray-200"}`}>
                  <div className="flex items-start justify-between">
                    <div className="flex-1">
                      <div className="font-semibold text-sm text-gray-800">{t.topic}</div>
                      <div className="text-xs text-gray-400 mt-0.5">Skill: {t.skillName} · {t.trainer} · {t.type}</div>
                      <div className="text-xs text-gray-400 mb-2">Training Target: {fmtDate(t.date)}</div>
                      
                      {(t.evidence||t.evidenceFile)&&(
                        <div className="mt-1 text-xs text-gray-500 border-l-2 border-blue-200 pl-2">
                          {t.evidence&&<div className="mb-1">📝 Execution Details: {t.evidence}</div>}
                          {t.evidenceFile&&<button onClick={()=>downloadDataUrl(t.evidenceFile.url, t.evidenceFile.name)} className="flex items-center gap-1 text-blue-600 hover:text-blue-800 font-semibold underline underline-offset-2"><IC.download className="w-3 h-3"/> Download Evidence: {t.evidenceFile.name}</button>}
                        </div>
                      )}

                      {st==="evaluated"&&(
                        <div className="mt-2 text-xs text-gray-600 border-l-2 border-purple-200 pl-2 bg-purple-50/50 py-1">
                          <div className="grid grid-cols-2 gap-x-2 gap-y-0.5">
                            <div><span className="text-gray-400">Assessor:</span> <span className="font-medium text-gray-800">{t.evaluatorName}</span></div>
                            <div><span className="text-gray-400">Date:</span> <span className="font-medium text-gray-800">{fmtDate(t.evalDate)}</span></div>
                            <div><span className="text-gray-400">Method:</span> <span className="font-medium text-gray-800">{t.evalMethod}</span></div>
                            <div><span className="text-gray-400">Target Score:</span> <span className="font-medium text-gray-800">{t.evalScore}</span></div>
                          </div>
                          {t.evalNotes&&<div className="mt-1">📝 Notes: {t.evalNotes}</div>}
                          {t.evalFile&&<button onClick={()=>downloadDataUrl(t.evalFile.url, t.evalFile.name)} className="flex items-center gap-1 text-purple-600 hover:text-purple-800 font-semibold underline underline-offset-2 mt-1"><IC.download className="w-3 h-3"/> Download Eval Sheet: {t.evalFile.name}</button>}
                        </div>
                      )}
                    </div>
                    <div className="flex flex-col items-end gap-1">
                      <span className={`text-xs px-2 py-1 rounded font-bold ${st==="evaluated"&&t.pass===true?"bg-green-100 text-green-700":st==="evaluated"&&t.pass===false?"bg-red-100 text-red-700":st==="evidence_done"?"bg-blue-100 text-blue-700":"bg-gray-100 text-gray-500"}`}>
                        {st==="evaluated"&&t.pass===true?"✓ Passed":st==="evaluated"&&t.pass===false?"✗ Failed":st==="evidence_done"?"📁 Evidence Done":"📋 Planned"}
                      </span>
                    </div>
                  </div>
                  {/* Workflow steps mini-bar */}
                  <div className="mt-3 flex items-center gap-1">
                    {[{l:"Plan Created",done:true},{l:"Evidence",done:st==="evidence_done"||st==="evaluated"},{l:"Evaluation",done:st==="evaluated"},{l:"Result",done:st==="evaluated"&&t.pass!==null}].map((step,si)=>(
                      <div key={si} className="flex items-center gap-1">
                        <div className={`flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium ${step.done?"bg-green-100 text-green-700":"bg-gray-100 text-gray-400"}`}>
                          {step.done&&<IC.check className="w-2.5 h-2.5"/>}{step.l}
                        </div>
