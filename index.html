// ─── APP ──────────────────────────────────────────────────────────────────
function App() {
  const [users, setUsers] = useState([]);
  const [emps, setEmps] = useState([]);
  const [dbReady, setDbReady] = useState(false);

  const fetchDb = async () => {
    try {
      const [uRes, eRes] = await Promise.all([fetch(SERVER+'/api/users'), fetch(SERVER+'/api/employees')]);
      const dbUsers = await uRes.json();
      const dbEmps = await eRes.json();
      
      if (dbUsers.length === 0) {
        await fetch(SERVER+'/api/users/init', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(INITIAL_USERS) });
      } else setUsers(dbUsers);
      
      if (dbEmps.length === 0) {
        await fetch(SERVER+'/api/employees/init', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(INITIAL_EMPLOYEES) });
      } else setEmps(dbEmps);
      
      setDbReady(true);
    } catch(err) { console.error("Sync Error", err); }
  };

  useEffect(() => {
    fetchDb();
    const sse = new EventSource(SERVER+'/api/live');
    sse.onmessage = (e) => fetchDb(); // Automatically re-pulls whenever ANY computer saves data!
    return () => sse.close();
  }, []);

  const [loggedInUser, setLoggedInUser] = useState(()=>{
    try { const local = localStorage.getItem("loggedInUser"); if(local) return JSON.parse(local); } catch(e){}
    return null;
  });
  useEffect(()=>{
    if(loggedInUser) localStorage.setItem("loggedInUser", JSON.stringify(loggedInUser));
    else localStorage.removeItem("loggedInUser");
  }, [loggedInUser]);

  function handleLogin(username, password, setError) {
    const user = users.find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);
    if(user) setLoggedInUser(user);
    else setError("Invalid username or password");
  }

  const [page,setPage] = useState("dashboard");
  const [col,setCol] = useState(false);
  const [selId,setSelId] = useState(null);
  const [drawerOpen,setDrawerOpen] = useState(false);
  const [search,setSearch] = useState("");
  const importRef = useRef();
  const skillsImportRef = useRef();
  const [importDialog,setImportDialog] = useState(false);
  const [importResult,setImportResult] = useState(null);
  const [skillsImportDialog,setSkillsImportDialog] = useState(false);
  const [skillsImportResult,setSkillsImportResult] = useState(null);
  const [addEmpModal,setAddEmpModal] = useState(false);

  const selEmp = emps.find(e=>e.id===selId);
  function openEmp(id){setSelId(id);setDrawerOpen(true);}
  function closeDrawer(){setDrawerOpen(false);setTimeout(()=>setSelId(null),250);}
  
  async function updateEmp(updated){ 
    setEmps(prev=>prev.map(e=>e.id===updated.id?updated:e)); // Optimistic UI
    await fetch(SERVER+'/api/employees', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(updated) }); 
  }
  async function addEmp(newEmp){ 
    setEmps(prev=>[...prev,newEmp]); 
    setAddEmpModal(false); 
    await fetch(SERVER+'/api/employees', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(newEmp) }); 
  }

  async function handleBatchUpdate(upsertList) {
    setEmps(prev => {
      let next = [...prev];
      upsertList.forEach(u => {
        const idx = next.findIndex(x => x.id === u.id);
        if(idx>=0) next[idx] = u; else next.push(u);
      });
      return next;
    });
    await fetch(SERVER+'/api/employees/batch', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ upsertList }) });
  }

  // ── TEMPLATE DOWNLOADS ──
  function downloadEmpTemplate() {
    const ws = XLSX.utils.aoa_to_sheet([
      ["Name","Card No","Designation","Department","Date of Joining","Date of Birth","Photo URL"],
      ["Rahul Sharma","C-101","CNC Operator","2121 CNC","2023-06-01","1995-04-15","https://example.com/photo.jpg"],
      ["Priya Mehta","C-102","HR Executive","HR","2022-01-10","1997-08-22",""],
      ["Suresh Patel","C-103","Helper","Hot Forging","2024-03-15","2000-11-30",""],
    ]);
    ws["!cols"]=[{wch:22},{wch:12},{wch:24},{wch:20},{wch:18},{wch:16},{wch:30}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Employees");
    XLSX.writeFile(wb,"Employee_Import_Template.xlsx");
  }

  function downloadSkillTemplate() {
    const ws = XLSX.utils.aoa_to_sheet([
      ["Designation","Skill Name","Required Level (1-5)"],
      ["CNC Operator","CNC Machine Operation",4],
      ["CNC Operator","Blueprint Reading",3],
      ["CNC Operator","5S Implementation",3],
      ["Helper","Basic Safety",3],
      ["Helper","Manual Handling",2],
      ["HR Executive","Recruitment Process",4],
      ["HR Executive","HRMS Software",3],
    ]);
    ws["!cols"]=[{wch:26},{wch:28},{wch:22}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Skills by Designation");
    XLSX.writeFile(wb,"Skills_Import_Template.xlsx");
  }

  // ── EMPLOYEE IMPORT ──
  function smartImport(file) {
    const r=new FileReader();
    r.onload=function(e){
      try {
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
        const sn=wb.SheetNames[0];
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:""});
        if(!rows.length){alert("⚠️ Sheet is empty.");return;}

        // Flexible header matching
        const headers=Object.keys(rows[0]);
        const norm=s=>(s||"").toLowerCase().replace(/[^a-z0-9]/g,"");
        const hN=headers.map(norm);
        const find=(kws)=>{for(const kw of kws){const i=hN.findIndex(h=>h.includes(kw));if(i>=0)return headers[i];}return null;};

        const colName   = find(["name"]);
        const colCard   = find(["cardno","card","empid","employeeid"]);
        const colDesig  = find(["designation","position","role","title"]);
        const colDept   = find(["department","dept"]);
        const colDoj    = find(["doj","joining","joiningdate","dateofjoining"]);
        const colDob    = find(["dob","birth","dateofbirth","birthdate"]);
        const colPhoto  = find(["photo","image","picture","avatar","photourl"]);

        if(!colName){alert("⚠️ Could not find a 'Name' column.\n\nPlease use the downloaded template.");return;}

        const employees=rows
          .filter(row=>(row[colName]||"").toString().trim())
          .map(function(row,i){
            // Parse dates — handle Excel serial numbers too
            function parseDate(val){
              if(!val) return "";
              if(typeof val==="number"){
                // Excel date serial
                const d=XLSX.SSF.parse_date_code(val);
                if(d) return `${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`;
              }
              const s=String(val).trim();
              // Already ISO
              if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
              // DD/MM/YYYY or DD-MM-YYYY
              const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
              if(m) return `${m[3].length===2?"20"+m[3]:m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
              return s;
            }
            return {
              id:"IMP_"+Date.now()+"_"+i,
              cardNo: colCard?(row[colCard]||"").toString().trim()||"C-"+(i+1):"C-"+(i+1),
              name:   (row[colName]||"").toString().trim(),
              designation: colDesig?(row[colDesig]||"").toString().trim():"",
              department:  colDept?(row[colDept]||"").toString().trim():"",
              doj:  parseDate(colDoj?row[colDoj]:""),
              dob:  parseDate(colDob?row[colDob]:""),
              photo: colPhoto?(row[colPhoto]||"").toString().trim()||null:null,
              reportsTo:null,responsibility:"",accountability:"",authority:"",skills:[],team:[]
            };
          });

        if(!employees.length){alert("⚠️ No valid employee rows found.");return;}
        setImportResult({employees,sheetName:sn});
        setImportDialog(true);
      } catch(err){alert("Error reading file: "+err.message);}
    };
    r.readAsArrayBuffer(file);
  }

  // ── SKILLS IMPORT ──
  function handleSkillsTemplateImport(file){
    const r=new FileReader();
    r.onload=function(e){
      try {
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
        const sn=wb.SheetNames[0];
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:""});
        if(!rows.length){alert("⚠️ Sheet is empty.");return;}

        const headers=Object.keys(rows[0]);
        const norm=s=>(s||"").toLowerCase().replace(/[^a-z0-9]/g,"");
        const hN=headers.map(norm);
        const find=(kws)=>{for(const kw of kws){const i=hN.findIndex(h=>h.includes(kw));if(i>=0)return headers[i];}return null;};

        const colDesig = find(["designation","position","role"]);
        const colSkill = find(["skill","skillname"]);
        const colReq   = find(["required","req","level"]);

        if(!colDesig||!colSkill){alert("⚠️ Columns not found.\n\nRequired columns:\n• Designation\n• Skill Name\n• Required Level (1-5)\n\nPlease use the downloaded template.");return;}

        const allSkills={};
        let lastDesig="";
        rows.forEach(function(row){
          const desig=(row[colDesig]||"").toString().trim();
          const skill=(row[colSkill]||"").toString().trim();
          // Support blank designation cells (continuation of previous)
          if(desig) lastDesig=desig;
          const useDesig=desig||lastDesig;
          if(!useDesig||!skill) return;
          const req=Math.min(5,Math.max(1,parseInt(colReq?row[colReq]:3)||3));
          if(!allSkills[useDesig]) allSkills[useDesig]=[];
          // Avoid duplicate skill names under same designation
          if(!allSkills[useDesig].find(s=>s.name.toLowerCase()===skill.toLowerCase())){
            allSkills[useDesig].push({name:skill,required:req,current:0,trainings:[]});
          }
        });

        if(!Object.keys(allSkills).length){alert("⚠️ No valid skill rows found.\n\nMake sure Designation and Skill Name columns have data.");return;}

        const existingDesigs=Array.from(new Set(emps.map(e=>e.designation)));
        const matched=Object.keys(allSkills).filter(d=>existingDesigs.some(ed=>ed.toLowerCase()===d.toLowerCase()));
        const unmatched=Object.keys(allSkills).filter(d=>!existingDesigs.some(ed=>ed.toLowerCase()===d.toLowerCase()));
        const preview=matched.map(des=>({
          designation:des,
          skillCount:allSkills[des].length,
          employees:emps.filter(e=>e.designation.toLowerCase()===des.toLowerCase())
        }));
        const totalSkills=Object.values(allSkills).reduce((s,a)=>s+a.length,0);
        setSkillsImportResult({allSkills,matched,unmatched,totalSkills,preview});
        setSkillsImportDialog(true);
      } catch(err){alert("Error reading file: "+err.message);}
    };
    r.readAsArrayBuffer(file);
  }

  async function confirmEmpImport(mode){
    const data=importResult.employees;
    
    let deleteIds = [];
    let upsertList = [];
    
    if(mode==="replace"){
      deleteIds = emps.map(e=>e.id);
      upsertList = data.map((e,i)=>({...e, id: "E"+String(i+1).padStart(3,"0")}));
    } else {
      const nextIdx = emps.length + 1;
      upsertList = data.map((e,i)=>({...e, id: "E"+String(nextIdx+i).padStart(3,"0")}));
    }
    
    await fetch(SERVER+'/api/employees/batch', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ deleteIds, upsertList }) });
    setImportDialog(false);setImportResult(null);
    alert(`✅ ${data.length} employees ${mode==="replace"?"imported (replaced all)":"added to existing list"}`);
  }

  async function confirmSkillsImport(mode){
    const {allSkills}=skillsImportResult;
    let upsertList = [];
    let updatedCnt = 0;
    
    emps.forEach(emp => {
      const matchKey=Object.keys(allSkills).find(k=>k.toLowerCase()===emp.designation.toLowerCase());
      if(matchKey) {
        updatedCnt++;
        const newSk=allSkills[matchKey].map((s,i)=>({...s,id:"sk"+Date.now()+i+Math.random().toString(36).slice(2,5)}));
        let updatedSkills;
        if(mode==="merge"){
          const exNames=(emp.skills||[]).map(s=>s.name.toLowerCase());
          updatedSkills = [...(emp.skills||[]),...newSk.filter(s=>!exNames.includes(s.name.toLowerCase()))];
        } else {
          updatedSkills = newSk;
        }
        upsertList.push({...emp, skills: updatedSkills});
      }
    });

    await fetch(SERVER+'/api/employees/batch', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ upsertList }) });
    setSkillsImportDialog(false);setSkillsImportResult(null);
    alert(`✅ Skills applied to ${updatedCnt} employees`);
  }

  const PAGE_TITLES = {dashboard:"Dashboard",employees:"Employees",skillMatrix:"Skill Matrix",training:"Training",overdue:"Overdue Items",reports:"Reports",settings:"Settings"};
  const sideW = col?60:240;

  // Department-level filtering based on user role
  const filteredEmps = loggedInUser?.role === "admin" ? emps : emps.filter(e => e.department === loggedInUser?.department);

  if(!dbReady) return <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center font-medium text-gray-500 gap-3"><svg className="animate-spin h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>Connecting to Live Cloud...</div>;
  if(!loggedInUser) return <LoginPage onLogin={handleLogin}/>;

  return (
    <div className="min-h-screen bg-gray-50">
      <Sidebar page={page} setPage={setPage} col={col} setCol={setCol} loggedInUser={loggedInUser}/>
      <Header title={PAGE_TITLES[page]||page} search={search} setSearch={setSearch} col={col} setCol={setCol} extra={
        <button onClick={()=>setLoggedInUser(null)} className="text-xs px-3 py-1.5 bg-red-50 text-red-600 font-medium rounded-lg border border-red-200 hover:bg-red-100 transition-colors shadow-sm">Logout</button>
      }/>

      {/* Main content */}
      <div className="transition-all pt-16" style={{marginLeft:sideW}}>
        <div className="p-5">
          {page==="dashboard"&&<DashboardPage emps={filteredEmps} onSelect={openEmp}/>}
          {page==="employees"&&<EmployeesPage emps={filteredEmps} onSelect={openEmp} importRef={importRef} skillsImportRef={skillsImportRef} onImport={smartImport} onSkillsImport={handleSkillsTemplateImport} onAddEmp={()=>setAddEmpModal(true)} onDlEmpTpl={downloadEmpTemplate} onDlSkillTpl={downloadSkillTemplate}/>}
          {page==="skillMatrix"&&<SkillMatrixPage emps={filteredEmps}/>}
          {page==="training"&&<TrainingPage emps={filteredEmps} onSelect={openEmp} onBatchUpdate={handleBatchUpdate}/>}
          {page==="overdue"&&<OverduePage emps={filteredEmps} onSelect={openEmp}/>}
          {page==="reports"&&<ReportsPage emps={filteredEmps}/>}
          {page==="settings"&&<SettingsPage loggedInUser={loggedInUser} users={users} setUsers={setUsers}/>}
        </div>
      </div>

      {/* Hidden file inputs */}
      <input ref={importRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>{if(e.target.files[0])smartImport(e.target.files[0]);e.target.value="";}}/>
      <input ref={skillsImportRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>{if(e.target.files[0])handleSkillsTemplateImport(e.target.files[0]);e.target.value="";}}/>

      {/* Employee Drawer */}
      <div className={`drawer-overlay fixed inset-0 bg-black/20 z-40 ${drawerOpen?"open":""}`} onClick={closeDrawer}></div>
      <div className={`drawer-panel fixed top-0 right-0 bottom-0 bg-white shadow-2xl z-50 flex flex-col ${drawerOpen?"open":""}`} style={{width:460}} onClick={e=>e.stopPropagation()}>
        {selEmp&&<EmployeeDrawer emp={selEmp} allEmps={emps} onClose={closeDrawer} onUpdate={updateEmp}/>}
      </div>

      {/* Add Employee Modal */}
      {addEmpModal&&<AddEmployeeModal allEmps={emps} onSave={addEmp} onClose={()=>setAddEmpModal(false)}/>}

      {/* ── EMPLOYEE IMPORT DIALOG ── */}
      {importDialog&&importResult&&(
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md">
            <div className="p-5 border-b border-gray-100 flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center"><IC.upload className="w-5 h-5 text-blue-600"/></div>
              <div>
                <div className="font-bold text-gray-900">Employee Data Ready to Import</div>
                <div className="text-xs text-gray-400">Review and choose how to import</div>
              </div>
              <button onClick={()=>{setImportDialog(false);setImportResult(null);}} className="ml-auto p-1.5 text-gray-400 hover:text-gray-600"><IC.x className="w-5 h-5"/></button>
            </div>
            <div className="p-5 space-y-4">
              {/* Stats */}
              <div className="grid grid-cols-3 gap-3">
                <div className="bg-blue-50 rounded-xl p-3 text-center"><div className="text-2xl font-bold text-blue-700">{importResult.employees.length}</div><div className="text-xs text-gray-500">Employees</div></div>
                <div className="bg-purple-50 rounded-xl p-3 text-center"><div className="text-2xl font-bold text-purple-700">{Array.from(new Set(importResult.employees.map(e=>e.designation).filter(Boolean))).length}</div><div className="text-xs text-gray-500">Designations</div></div>
                <div className="bg-green-50 rounded-xl p-3 text-center"><div className="text-2xl font-bold text-green-700">{Array.from(new Set(importResult.employees.map(e=>e.department).filter(Boolean))).length}</div><div className="text-xs text-gray-500">Departments</div></div>
              </div>
              {/* Preview table */}
              <div className="border border-gray-200 rounded-xl overflow-hidden">
                <div className="bg-gray-50 px-4 py-2 text-xs font-semibold text-gray-400 uppercase border-b border-gray-200">Preview (first 5 rows)</div>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs">
                    <thead><tr className="border-b border-gray-100">
                      <th className="px-3 py-2 text-left text-gray-500">Name</th>
                      <th className="px-3 py-2 text-left text-gray-500">Card No</th>
                      <th className="px-3 py-2 text-left text-gray-500">Designation</th>
                      <th className="px-3 py-2 text-left text-gray-500">Dept</th>
                    </tr></thead>
                    <tbody>
                      {importResult.employees.slice(0,5).map((e,i)=>(
                        <tr key={i} className="border-b border-gray-50">
                          <td className="px-3 py-2 font-medium text-gray-800">{e.name}</td>
                          <td className="px-3 py-2 text-gray-500">{e.cardNo}</td>
                          <td className="px-3 py-2 text-gray-600">{e.designation||<span className="text-gray-300">—</span>}</td>
                          <td className="px-3 py-2 text-gray-600">{e.department||<span className="text-gray-300">—</span>}</td>
                        </tr>
                      ))}
                      {importResult.employees.length>5&&<tr><td colSpan={4} className="px-3 py-2 text-center text-gray-400">…and {importResult.employees.length-5} more</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>
              {/* Import mode */}
              <div>
                <div className="text-xs font-semibold text-gray-500 uppercase mb-2">How to import?</div>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={()=>confirmEmpImport("add")} className="bg-green-600 text-white py-3 rounded-xl font-semibold text-sm hover:bg-green-700">
                    ➕ Add to Existing
                    <div className="text-xs font-normal opacity-80 mt-0.5">Keep current employees</div>
                  </button>
                  <button onClick={()=>window.confirm("This will REPLACE all current employees. Are you sure?")&&confirmEmpImport("replace")} className="bg-blue-600 text-white py-3 rounded-xl font-semibold text-sm hover:bg-blue-700">
                    🔄 Replace All
                    <div className="text-xs font-normal opacity-80 mt-0.5">Overwrite everything</div>
                  </button>
                </div>
              </div>
              <button onClick={()=>{setImportDialog(false);setImportResult(null);}} className="w-full text-gray-400 text-sm py-2 hover:text-gray-600">Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* ── SKILLS IMPORT DIALOG ── */}
      {skillsImportDialog&&skillsImportResult&&(
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-auto">
            <div className="p-5 border-b border-gray-100 flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center"><IC.matrix className="w-5 h-5 text-purple-600"/></div>
              <div>
                <div className="font-bold text-gray-900">Skills Ready to Import</div>
                <div className="text-xs text-gray-400">Designation-wise skills will be applied</div>
              </div>
              <button onClick={()=>{setSkillsImportDialog(false);setSkillsImportResult(null);}} className="ml-auto p-1.5 text-gray-400 hover:text-gray-600"><IC.x className="w-5 h-5"/></button>
            </div>
            <div className="p-5 space-y-4">
              {/* Stats */}
              <div className="grid grid-cols-3 gap-3">
                <div className="bg-purple-50 rounded-xl p-3 text-center"><div className="text-xl font-bold text-purple-700">{skillsImportResult.matched.length+skillsImportResult.unmatched.length}</div><div className="text-xs text-gray-400">Designations</div></div>
                <div className="bg-green-50 rounded-xl p-3 text-center"><div className="text-xl font-bold text-green-700">{skillsImportResult.matched.length}</div><div className="text-xs text-gray-400">Matched ✓</div></div>
                <div className="bg-blue-50 rounded-xl p-3 text-center"><div className="text-xl font-bold text-blue-700">{skillsImportResult.totalSkills}</div><div className="text-xs text-gray-400">Total Skills</div></div>
              </div>

              {/* Matched list */}
              {skillsImportResult.matched.length>0&&(
                <div className="border border-green-200 rounded-xl overflow-hidden">
                  <div className="bg-green-50 px-4 py-2 text-xs font-semibold text-green-700 uppercase border-b border-green-100">✅ Will be applied to these designations</div>
                  {skillsImportResult.preview.map((p,i)=>(
                    <div key={i} className="flex items-center justify-between px-4 py-2.5 border-b border-gray-50 last:border-0">
                      <div>
                        <div className="text-sm font-medium text-gray-800">{p.designation}</div>
                        <div className="text-xs text-gray-400">{p.employees.length} employee{p.employees.length!==1?"s":""} will be updated</div>
                      </div>
                      <div className="text-xs bg-purple-100 text-purple-700 px-2 py-1 rounded font-semibold">{p.skillCount} skills</div>
                    </div>
                  ))}
                </div>
              )}

              {/* Unmatched */}
              {skillsImportResult.unmatched.length>0&&(
                <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-3">
                  <div className="text-xs font-semibold text-yellow-700 uppercase mb-1.5">⚠️ No matching employees — will be skipped</div>
                  <div className="flex flex-wrap gap-1.5">
                    {skillsImportResult.unmatched.map((d,i)=><span key={i} className="text-xs bg-white border border-yellow-200 px-2 py-0.5 rounded text-yellow-700">{d}</span>)}
                  </div>
                </div>
              )}

              {skillsImportResult.matched.length===0&&(
                <div className="bg-red-50 border border-red-200 rounded-xl p-4 text-center text-sm text-red-700">
                  No designations matched. Make sure designation names in the Excel exactly match what's in the app.
                </div>
              )}

              {/* Mode buttons */}
              {skillsImportResult.matched.length>0&&(
                <div>
                  <div className="text-xs font-semibold text-gray-500 uppercase mb-2">How to import?</div>
                  <div className="grid grid-cols-2 gap-3">
                    <button onClick={()=>confirmSkillsImport("merge")} className="bg-green-600 text-white py-3 rounded-xl font-semibold text-sm hover:bg-green-700">
                      ➕ Add New Skills
                      <div className="text-xs font-normal opacity-80 mt-0.5">Keep existing skills</div>
                    </button>
                    <button onClick={()=>window.confirm("This will REPLACE existing skills for matched designations. Continue?")&&confirmSkillsImport("replace")} className="bg-blue-600 text-white py-3 rounded-xl font-semibold text-sm hover:bg-blue-700">
                      🔄 Replace Skills
                      <div className="text-xs font-normal opacity-80 mt-0.5">Overwrite existing</div>
                    </button>
                  </div>
                </div>
              )}
              <button onClick={()=>{setSkillsImportDialog(false);setSkillsImportResult(null);}} className="w-full text-gray-400 text-sm py-2 hover:text-gray-600">Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
